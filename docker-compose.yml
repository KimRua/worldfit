services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verifit-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: verifit1234
      DB_NAME: verifit
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      CORS_ORIGIN: http://localhost:8080
      TRUST_PROXY: 1
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: verifit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: verifit1234
      MYSQL_DATABASE: verifit
    ports:
      - "3306:3306"
    volumes:
      - verifit_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pverifit1234"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: verifit-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  verifit_mysql_data:
